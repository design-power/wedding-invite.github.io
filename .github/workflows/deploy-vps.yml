name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.VPS_PATH }}"
            if [ -z "$APP_DIR" ]; then
              echo "VPS_PATH secret is empty"
              exit 1
            fi

            cd "$APP_DIR"
            git pull --ff-only origin main
            npm ci
            npm run build

            mkdir -p server/data

            if pm2 describe wedding-api >/dev/null 2>&1; then
              pm2 restart wedding-api --update-env
            else
              pm2 start server/index.js --name wedding-api --cwd "$APP_DIR"
            fi
            pm2 save

            nginx -t
            systemctl reload nginx
